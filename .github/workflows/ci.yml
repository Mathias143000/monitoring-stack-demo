name: monitoring-lab-ci-cd

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Prepare environment
        run: bash scripts/bootstrap.sh

      - name: Lint project
        run: bash scripts/lint.sh

      - name: Run tests with coverage
        run: bash scripts/test.sh --cov=monitoring_demo --cov-report=term-missing

  docker-smoke:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment
        run: bash scripts/bootstrap.sh --compose-only

      - name: Build and start stack
        run: bash scripts/stack-up.sh

      - name: Run smoke checks
        run: bash scripts/smoke.sh

      - name: Collect evidence on failure
        if: failure()
        run: bash scripts/collect-evidence.sh artifacts/evidence

      - name: Collect Docker logs on failure
        if: failure()
        run: bash scripts/logs.sh artifacts/docker-compose.log

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: artifacts/docker-compose.log

      - name: Upload evidence bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: observability-evidence
          path: artifacts/evidence

      - name: Tear down stack
        if: always()
        run: bash scripts/stack-down.sh --volumes

  publish-image:
    needs:
      - quality
      - docker-smoke
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image
        run: |
          IMAGE_NAME="$(echo 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
