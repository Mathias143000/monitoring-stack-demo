global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    stack: monitoring-demo

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: app
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]

  - job_name: blackbox-app
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ["http://app:8000/health"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: blackbox-edge
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ["http://nginx:8080/health"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: blackbox-grafana
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ["http://grafana:3000/api/health"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: blackbox-prometheus
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ["http://prometheus:9090/-/ready"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
