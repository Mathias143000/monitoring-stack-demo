groups:
  - name: monitoring-demo
    rules:
      - alert: MonitoringDemoAppDown
        expr: up{job="app"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: Monitoring demo app is down
          description: Prometheus cannot scrape the Flask app metrics endpoint.

      - alert: MonitoringDemoDatabaseUnavailable
        expr: app_db_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: SQLite status is unhealthy
          description: The application reports that the local database is unavailable.

      - alert: MonitoringDemoErrorResponses
        expr: sum(rate(app_http_errors_total[5m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Monitoring demo app serves error responses
          description: The synthetic app returned HTTP 4xx or 5xx during the last 5 minutes.

      - alert: MonitoringDemoHighLatency
        expr: histogram_quantile(0.95, sum by (le) (rate(app_http_request_duration_seconds_bucket[5m]))) > 0.8
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Monitoring demo app latency is elevated
          description: The p95 latency is above 800ms during the last 5 minutes.

      - alert: MonitoringDemoOverdueTickets
        expr: app_tickets_overdue > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Overdue tickets detected
          description: Open tickets are older than the configured overdue threshold.

      - alert: MonitoringDemoInfluxWriteFailures
        expr: increase(app_influx_write_failures_total[10m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: InfluxDB export failures detected
          description: The app failed to export business metrics to InfluxDB during the last 10 minutes.

      - alert: MonitoringDemoInfraTargetDown
        expr: up{job=~"alertmanager|cadvisor|node-exporter|blackbox-app|blackbox-edge|blackbox-grafana|blackbox-prometheus"} == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Monitoring lab exporter is unavailable
          description: Prometheus cannot scrape {{ $labels.job }} on {{ $labels.instance }}.

      - alert: MonitoringDemoSyntheticProbeFailure
        expr: probe_success{job=~"blackbox-.*"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: Synthetic health probe failed
          description: Blackbox probe {{ $labels.job }} cannot reach {{ $labels.instance }}.
